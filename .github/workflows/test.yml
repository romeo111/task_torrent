name: Test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v

      - name: Lint OpenOnco chunks (non-blocking smoke)
        # Existing chunks pre-date Proposals #1 + #19; this surfaces gaps without failing CI.
        run: python -m tasktorrent.lint_chunk_spec --all chunks/openonco/ || true
