name: Test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v

      - name: Lint OpenOnco chunks (now blocking — backfill complete 2026-04-29)
        # The OpenOnco shelf is a hard gate: every chunk spec must pass
        # the v0.4 linter before status-active promotion.
        env:
          PYTHONIOENCODING: utf-8
        run: python -m tasktorrent.lint_chunk_spec --all chunks/openonco/
