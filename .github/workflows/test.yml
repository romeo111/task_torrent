name: Test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v

      - name: Lint OpenOnco chunks (non-blocking smoke)
        # Per owner decision 2026-04-28: prefer version-aware exemptions.
        # Pre-v0.4 chunks predate Economic Profile + claim_method; surface
        # gaps without failing CI. Once OpenOnco backfills, flip to blocking.
        run: python -m tasktorrent.lint_chunk_spec --all chunks/openonco/ || true
